<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🇱🇹 Lietuvių · Тренажер A2 · ПМП</title>
<meta name="description" content="Тренажер литовської мови (A2 / ПМП): лексика, відмінки, переклад, граматика.">
<style>
  :root{
    --bg:#F4F6F3; --card:#FFFFFF; --ink:#1A211C; --muted:#6A7269;
    --line:#E2E7DE; --accent:#1F7A5A; --accent2:#176B6B; --soft:#E6F1EC;
    --ok:#15803D; --bad:#C0392B; --warn:#B45309; --gold:#C99A2E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    line-height:1.45;padding:0}
  .wrap{max-width:680px;margin:0 auto;padding:16px 14px 80px}
  header h1{font-size:20px;margin:0;letter-spacing:-.01em}
  header p{font-size:12px;color:var(--muted);margin:2px 0 0}
  .bar{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:8px 11px;font-size:12px;text-align:center;flex:1;min-width:60px}
  .pill b{display:block;font-size:17px;color:var(--accent)}
  h2{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;
    margin:20px 0 9px;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:14px 12px;cursor:pointer;transition:.12s;text-align:left}
  .tile:active{transform:scale(.98)}
  .tile.sel{border-color:var(--accent);background:var(--soft)}
  .tile .ic{font-size:20px}
  .tile .t{font-weight:650;font-size:14px;margin-top:5px}
  .tile .d{font-size:11px;color:var(--muted);margin-top:2px}
  .mode{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:9px}
  .mode:active{transform:scale(.99)}
  .mode .ic{font-size:22px;width:30px;text-align:center}
  .mode .t{font-weight:650;font-size:14.5px}
  .mode .d{font-size:11.5px;color:var(--muted)}
  .go{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;
    padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
  .go:disabled{background:#B7C3BC}
  .ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  /* practice */
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,.04);min-height:120px}
  .prompt{font-size:13px;color:var(--muted);margin-bottom:8px}
  .big{font-size:24px;font-weight:700;letter-spacing:-.01em}
  .hintword{font-size:13px;color:var(--accent);margin-top:6px}
  input.ans{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:11px;
    font-size:17px;margin-top:14px;background:var(--bg);font-family:inherit}
  input.ans:focus{outline:none;border-color:var(--accent)}
  .opt{display:block;width:100%;text-align:left;background:var(--bg);border:1.5px solid var(--line);
    border-radius:11px;padding:13px;font-size:16px;margin-top:9px;cursor:pointer;font-family:inherit}
  .opt:active{transform:scale(.99)}
  .opt.ok{border-color:var(--ok);background:#eaf7ee}
  .opt.bad{border-color:var(--bad);background:#fbecea}
  .fb{margin-top:14px;padding:11px 13px;border-radius:11px;font-size:14px;display:none}
  .fb.ok{background:#eaf7ee;color:var(--ok);display:block}
  .fb.bad{background:#fbecea;color:var(--bad);display:block}
  .fb b{color:var(--ink)}
  .reveal{font-size:13px;margin-top:6px}
  .pbtns{display:flex;gap:9px;margin-top:14px}
  .pbtns button{flex:1;padding:13px;border-radius:11px;border:none;font:inherit;font-weight:650;cursor:pointer}
  .progress{height:5px;background:var(--line);border-radius:3px;margin:14px 0 4px;overflow:hidden}
  .progress i{display:block;height:100%;background:var(--accent);width:0;transition:.3s}
  .match{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .mItem{background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:12px 9px;
    font-size:14px;text-align:center;cursor:pointer}
  .mItem.sel{border-color:var(--accent);background:var(--soft)}
  .mItem.done{opacity:.35;pointer-events:none;border-style:dashed}
  .mItem.bad{border-color:var(--bad);background:#fbecea}
  .flip{perspective:1000px;cursor:pointer}
  .flip .inner{position:relative;text-align:center;padding:34px 16px;border-radius:16px;
    background:var(--card);border:1px solid var(--line);min-height:90px;display:flex;
    align-items:center;justify-content:center;font-size:24px;font-weight:700}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .topbar button{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;font-weight:600;padding:6px}
  .grm{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:11px}
  .grm h3{margin:0 0 8px;font-size:15px;color:var(--accent2)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 5px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-size:11px;text-transform:uppercase}
  code{background:var(--soft);padding:1px 5px;border-radius:5px;font-size:13px}
  .hide{display:none}
  .small{font-size:11.5px;color:var(--muted);margin-top:10px}
</style>
</head>

<div class="wrap">
  <!-- HOME -->

    <header><h1>🇱🇹 Lietuvių · Тренажер A2 · ПМП</h1><p>Лексика · відмінки · переклад · граматика. Прогрес зберігається.</p></header>
    <div class="bar" id="stats"></div>

    <div class="grid" id="themes"></div>

    <h2>2 · Обери режим</h2>

    <button class="go" id="start" disabled onclick="start()">Почати тренування</button>
    <button class="go ghost" onclick="show('grammar')">📖 Граматичний довідник</button>
    <p class="small">Порада: режими «Переклад» і «Пропуски» найкорисніші для відмінків. Слова, де помиляєшся, повертаються частіше.</p>
  </div>

  <!-- PRACTICE -->
  <div id="practice" class="hide">
    <div class="topbar">
      <button onclick="show('home')">‹ Меню</button>
      <span id="pcounter" class="small"></span>
      <button onclick="restart()">↻</button>
    </div>
    <div class="progress"><i id="pbar"></i></div>
    <div id="pbody"></div>
  </div>

  <!-- GRAMMAR -->
  <div id="grammar" class="hide">
    <div class="topbar"><button onclick="show('home')">‹ Меню</button><span class="small">Довідник</span><span></span></div>
    <div id="gbody"></div>
  </div>
</div>

let selTheme=null, selMode=null, queue=[], qi=0, correct=0, prog={};
const hasStore = typeof window.storage!=="undefined" && window.storage;
const hasLS = (()=>{try{localStorage.setItem("__t","1");localStorage.removeItem("__t");return true;}catch(e){return false;}})();

async function loadProg(){
  try{
    if(hasStore){const r=await window.storage.get("lt_prog");prog=JSON.parse(r.value);}
    else if(hasLS){const v=localStorage.getItem("lt_prog");prog=v?JSON.parse(v):{};}
  }catch(e){prog={};}
  renderHome();
}
async function saveProg(){
  try{
    if(hasStore){await window.storage.set("lt_prog",JSON.stringify(prog));}
    else if(hasLS){localStorage.setItem("lt_prog",JSON.stringify(prog));}
  }catch(e){}
}
function key(th,w){return th+"|"+w;}
function lvl(th,w){return prog[key(th,w)]||0;}
function bump(th,w,ok){
  const k=key(th,w); let v=prog[k]||0;
  prog[k]=ok?Math.min(5,v+1):Math.max(0,v-1); saveProg();
}

/* ============ HOME ============ */
function renderHome(){
  // stats
  let total=0,learned=0,review=0;
  Object.keys(THEMES).forEach(th=>THEMES[th].words.forEach(([w])=>{
    total++; const l=lvl(th,w); if(l>=3)learned++; else if(l>=1)review++;
  }));
  document.getElementById("stats").innerHTML=
    `<div class="pill"><b>${total}</b>слів усього</div>
     <div class="pill"><b>${learned}</b>опановано</div>
     <div class="pill"><b>${review}</b>на повторенні</div>`;
  // themes
  document.getElementById("themes").innerHTML=Object.keys(THEMES).map(k=>{
    const t=THEMES[k];
    let mastered=0, touched=0, sum=0;
    t.words.forEach(([w])=>{const l=lvl(k,w); sum+=Math.min(l,3); if(l>=3)mastered++; if(l>=1)touched++;});
    const tot=t.words.length;
    const pct=Math.round(sum/(tot*3)*100);
    const state=mastered>=tot?"ok":touched>0?"mid":"none";
    const col=state==="ok"?"var(--ok)":state==="mid"?"var(--warn)":"var(--line)";
    const badge=state==="ok"?"✓ готово":`${mastered}/${tot} опановано`;
    return `<div class="tile ${selTheme===k?'sel':''}" onclick="pickTheme('${k}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="ic">${t.ic}</div>
        <span style="font-size:10px;font-weight:700;color:${col}">${badge}</span></div>
      <div class="t">${t.name}</div>
      <div class="d">${t.words.length} слів · ${t.desc}</div>
      <div style="height:4px;background:var(--line);border-radius:3px;margin-top:7px;overflow:hidden">
        <i style="display:block;height:100%;width:${pct}%;background:${col};transition:.3s"></i></div></div>`;}).join("");
  // modes
  document.getElementById("modes").innerHTML=Object.keys(MODES).map(k=>{
    const m=MODES[k];return `<div class="mode ${selMode===k?'sel':''}" onclick="pickMode('${k}')"
      style="${selMode===k?'border-color:var(--accent);background:var(--soft)':''}">
      <div class="ic">${m.ic}</div><div><div class="t">${m.t}</div><div class="d">${m.d}</div></div></div>`;}).join("");
  document.getElementById("start").disabled=!(selTheme&&selMode);
}
function pickTheme(k){selTheme=k;renderHome();}
function pickMode(k){selMode=k;renderHome();}
function show(id){["home","practice","grammar"].forEach(x=>document.getElementById(x).classList.add("hide"));
  document.getElementById(id).classList.remove("hide");
  if(id==="home")renderHome();
  if(id==="grammar")document.getElementById("gbody").innerHTML=GRAMMAR;
  window.scrollTo(0,0);
}

/* ============ PRACTICE ============ */
function start(){
  const t=THEMES[selTheme];
  if(selMode==="blanks"){ queue=shuffle([...t.blanks]); }
  else if(selMode==="translate"){ queue=shuffle([...t.sent]); }
  else if(selMode==="matching"){ queue=chunk(shuffle([...t.words]),5); }
  else { // flashcards / choice — за словами, слабші частіше
    let pool=[...t.words]; pool.sort((a,b)=>lvl(selTheme,a[0])-lvl(selTheme,b[0]));
    queue=selMode==="choice"?shuffle(pool):pool;
  }
  qi=0;correct=0;show("practice");renderQ();
}
function restart(){start();}
function renderQ(){
  const body=document.getElementById("pbody");
  const total=queue.length;
  document.getElementById("pbar").style.width=(qi/total*100)+"%";
  document.getElementById("pcounter").textContent=`${Math.min(qi+1,total)} / ${total} · ✓ ${correct}`;
  if(qi>=total){ return finish(); }

  if(selMode==="flashcards") renderFlash();
  else if(selMode==="translate") renderTranslate();
  else if(selMode==="choice") renderChoice();
  else if(selMode==="blanks") renderBlanks();
  else if(selMode==="matching") renderMatch();
}
function next(){qi++;renderQ();}

/* --- flashcards --- */
function renderFlash(){
  const [lt,ua]=queue[qi];
  document.getElementById("pbody").innerHTML=`
    <div class="prompt">Тап по картці, щоб побачити переклад</div>
    <div class="flip" id="fl"><div class="inner" id="flin">${lt}</div></div>
    <div id="flbtns" class="pbtns hide">
      <button style="background:#fbecea;color:var(--bad)" onclick="flAns(false)">Не знав</button>
      <button style="background:#eaf7ee;color:var(--ok)" onclick="flAns(true)">Знав ✓</button></div>`;
  document.getElementById("fl").onclick=()=>{
    document.getElementById("flin").innerHTML=`<span style="color:var(--accent)">${ua}</span>`;
    document.getElementById("flbtns").classList.remove("hide");
    document.querySelector("#practice .prompt")||0;
    document.querySelector(".prompt").textContent="Знав це слово?";
  };
}
function flAns(ok){const [lt]=queue[qi];if(ok)correct++;bump(selTheme,lt,ok);next();}

/* --- translate (ввід) --- */
function renderTranslate(){
  const [lt,ua]=queue[qi];
  document.getElementById("pbody").innerHTML=`
    <div class="pcard"><div class="prompt">Переклади литовською:</div><div class="big">${ua}</div>
    <input class="ans" id="inp" autocapitalize="off" autocomplete="off" placeholder="напиши литовською…">
    <div class="fb" id="fb"></div></div>
    <div class="pbtns"><button class="ghost" onclick="checkTr()">Перевірити</button>
    <button id="nx" class="hide" style="background:var(--accent);color:#fff" onclick="next()">Далі ›</button></div>`;
  const inp=document.getElementById("inp");inp.focus();
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")checkTr();});
}
function norm(s){return s.toLowerCase().replace(/[.,!?]/g,"").replace(/\s+/g," ").trim();}
function checkTr(){
  const [lt,ua]=queue[qi];const v=document.getElementById("inp").value;
  const fb=document.getElementById("fb");const ok=norm(v)===norm(lt);
  if(ok){correct++;fb.className="fb ok";fb.innerHTML="✓ Точно!";}
  else{fb.className="fb bad";fb.innerHTML=`Майже. Правильно: <b>${lt}</b>`;}
  document.getElementById("nx").classList.remove("hide");
  document.querySelector(".ghost").classList.add("hide");
}

/* --- choice --- */
function renderChoice(){
  const [lt,ua]=queue[qi];const t=THEMES[selTheme];
  let opts=[ua];while(opts.length<4){const r=t.words[Math.floor(Math.random()*t.words.length)][1];if(!opts.includes(r))opts.push(r);}
  opts=shuffle(opts);
  document.getElementById("pbody").innerHTML=`
    <div class="pcard"><div class="prompt">Що означає:</div><div class="big">${lt}</div></div>
    <div id="opts">${opts.map(o=>`<button class="opt" onclick="chAns(this,'${enc(o)}','${enc(ua)}')">${o}</button>`).join("")}</div>
    <div class="pbtns"><button id="nx" class="hide" style="background:var(--accent);color:#fff" onclick="next()">Далі ›</button></div>`;
}
function chAns(el,opt,ua){
  const [lt]=queue[qi];const ok=dec(opt)===dec(ua);
  document.querySelectorAll(".opt").forEach(b=>{b.onclick=null;
    if(b.textContent===dec(ua))b.classList.add("ok");});
  if(ok)correct++; else el.classList.add("bad");
  bump(selTheme,lt,ok);
  document.getElementById("nx").classList.remove("hide");
}

/* --- blanks --- */
function renderBlanks(){
  const [sent,ans,base,rule]=queue[qi];
  document.getElementById("pbody").innerHTML=`
    <div class="pcard"><div class="prompt">Встав правильну форму:</div>
    <div class="big">${sent}</div><div class="hintword">базове слово: ${base}</div>
    <input class="ans" id="inp" autocapitalize="off" autocomplete="off" placeholder="форма слова…">
    <div class="fb" id="fb"></div></div>
    <div class="pbtns"><button class="ghost" onclick="checkBl()">Перевірити</button>
    <button id="nx" class="hide" style="background:var(--accent);color:#fff" onclick="next()">Далі ›</button></div>`;
  const inp=document.getElementById("inp");inp.focus();
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")checkBl();});
}
function checkBl(){
  const [sent,ans,base,rule]=queue[qi];const v=document.getElementById("inp").value;
  const fb=document.getElementById("fb");const ok=norm(v)===norm(ans);
  if(ok){correct++;fb.className="fb ok";fb.innerHTML=`✓ Так! <b>${ans}</b> — ${rule}`;}
  else{fb.className="fb bad";fb.innerHTML=`Правильно: <b>${ans}</b><div class="reveal">📘 ${rule}</div>`;}
  document.getElementById("nx").classList.remove("hide");
  document.querySelector(".ghost").classList.add("hide");
}

/* --- matching --- */
let mSel=null;
function renderMatch(){
  const pairs=queue[qi];mSel=null;
  const lts=shuffle(pairs.map((p,i)=>({txt:p[0],id:i})));
  const uas=shuffle(pairs.map((p,i)=>({txt:p[1],id:i})));
  document.getElementById("pbody").innerHTML=`
    <div class="prompt">З'єднай пари (тап ліворуч, потім праворуч):</div>
    <div class="match">
      <div>${lts.map(x=>`<div class="mItem" data-side="l" data-id="${x.id}" onclick="mClick(this)">${x.txt}</div>`).join("")}</div>
      <div>${uas.map(x=>`<div class="mItem" data-side="r" data-id="${x.id}" onclick="mClick(this)">${x.txt}</div>`).join("")}</div>
    </div>
    <div class="pbtns"><button id="nx" class="hide" style="background:var(--accent);color:#fff" onclick="next()">Далі ›</button></div>`;
}
function mClick(el){
  if(!mSel){if(el.dataset.side!=="l")return;mSel=el;el.classList.add("sel");return;}
  if(el.dataset.side!=="r"){mSel.classList.remove("sel");mSel=el.dataset.side==="l"?el:null;if(mSel)el.classList.add("sel");return;}
  const ok=mSel.dataset.id===el.dataset.id;
  if(ok){mSel.classList.add("done");el.classList.add("done");mSel.classList.remove("sel");
    const pairs=queue[qi];bump(selTheme,pairs[+mSel.dataset.id][0],true);
    if(document.querySelectorAll('.mItem.done').length===pairs.length*2){correct++;document.getElementById("nx").classList.remove("hide");}
  } else {el.classList.add("bad");setTimeout(()=>el.classList.remove("bad"),500);mSel.classList.remove("sel");}
  mSel=null;
}

/* --- finish --- */
function finish(){
  document.getElementById("pbar").style.width="100%";
  const total=selMode==="matching"?queue.length:queue.length;
  const pct=Math.round(correct/total*100);
  const msg=pct>=80?"Puiku! Чудово! 🎉":pct>=50?"Gerai! Непогано, повтори слабкі.":"Reikia pakartoti — ще раз!";
  document.getElementById("pbody").innerHTML=`
    <div class="pcard" style="text-align:center">
      <div class="big">${correct} / ${total}</div>
      <div class="prompt" style="margin-top:8px">${msg}</div></div>
    <div class="pbtns">
      <button class="ghost" onclick="show('home')">До меню</button>
      <button style="background:var(--accent);color:#fff" onclick="restart()">Ще раз ↻</button></div>`;
}

/* ============ helpers ============ */
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function chunk(a,n){const r=[];for(let i=0;i<a.length;i+=n)r.push(a.slice(i,i+n));return r;}
function enc(s){return s.replace(/'/g,"\\'");}
function dec(s){return s.replace(/\\'/g,"'");}

loadProg();
</script>
